name: Tests

on:
  push:
    paths: ["memxcore/**", "pyproject.toml", ".github/workflows/test.yml"]
  pull_request:
    paths: ["memxcore/**", "pyproject.toml"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev,bm25]"

      - name: Run tests
        run: pytest memxcore/tests/ -v --tb=short
